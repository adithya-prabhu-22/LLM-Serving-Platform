<!DOCTYPE html>

<html>

<head>

    <title>
        Generate Text
    </title>

    <link rel="stylesheet" href="../static/css/style.css">

</head>

<body>

    <div id="navbar"></div>

    <div id="notification-container"></div>

    <div class="generate-workspace">

        <!-- LEFT SETTINGS PANEL -->

        <div class="settings-panel">

            <h2>
                Model Configuration
            </h2>

            <div class="form-group">

                <label>
                    Model
                </label>

                <select id="model-id">

                    <option>
                        Loading...
                    </option>

                </select>

            </div>

            <div id="model-status" class="generate-status">

                Status: -

            </div>

            <div class="form-group">

                <label>
                    Max Tokens
                </label>

                <input type="number" id="max-tokens" value="50" min="1" max="2048">

                <small>
                    Maximum number of tokens to generate
                </small>

            </div>

            <button id="generate-btn" class="generate-btn">

                Generate

            </button>

        </div>

        <!-- RIGHT SIDE -->

        <div class="generate-right">

            <!-- PROMPT CARD -->

            <div class="prompt-panel">

                <div class="generate-header">

                    <h2>
                        Prompt
                    </h2>

                    <button id="clear-prompt" class="secondary-btn" type="button">

                        Clear

                    </button>

                </div>

                <textarea id="prompt" class="prompt-editor" placeholder="Enter your prompt here..."></textarea>

            </div>

            <!-- OUTPUT CARD -->

            <div class="output-panel">

                <div class="generate-header">

                    <h2>
                        Generated Response
                    </h2>

                    <button id="copy-output" class="secondary-btn" type="button">

                        Copy

                    </button>

                </div>

                <div id="output-box">

                    Your generated response will appear here.

                </div>

                <div class="output-footer">

                    <span>

                        Model:
                        <strong id="output-model">

                            -

                        </strong>

                    </span>

                    <span>

                        Tokens:
                        <strong id="output-tokens">

                            -

                        </strong>

                    </span>

                </div>

            </div>

        </div>

    </div>

    <script src="../static/js/components/navbar.js"></script>

    <script src="../static/js/app.js"></script>
    <script src="../static/js/pages/generate.js"></script>

</body>

</html>
